# Imported base rootfs plus pulled git repos with cross-target Rust and Go artifacts.

build_name = "imported-rootfs-cross-aarch64"
version = "2.0.0"
description = "Import a base rootfs tar, cross-build Rust and Go projects for aarch64, and install them into the image."
target = "aarch64-linux"
profile = "release"

[workspace]
root_dir = "examples/imported-rootfs-cross-aarch64"
build_dir = "../../.gaia/examples/imported-rootfs-cross-aarch64/build"
out_dir = "../../.gaia/examples/imported-rootfs-cross-aarch64/out"

[reporting]
summary = true
provenance = true
manifest = true

[providers.git]
timeout_seconds = 300

[providers.rust]
allow_nested_build = true
timeout_seconds = 900

[providers.go]
timeout_seconds = 900

[providers.starting_point]
timeout_seconds = 300

[execution]
jobs = 1

[[workspace.named_paths]]
alias = "assets"
path = "assets"
kind = "host"

[[sources]]
id = "base-rootfs"
kind = "path"
path = "seed"
refresh = "never"
pin = "locked"

[[sources]]
id = "rust-source"
kind = "git"
repo = "examples/imported-rootfs-cross-aarch64/seed-rust-repo"
branch = "main"
refresh = "never"
pin = "locked"

[[sources]]
id = "go-source"
kind = "git"
repo = "examples/imported-rootfs-cross-aarch64/seed-go-repo"
branch = "main"
refresh = "never"
pin = "locked"

[[artifacts]]
id = "rust-app"
kind = "rust"
package = "rust-app"
source = "rust-source"
target = "aarch64-unknown-linux-gnu"
profile = "${build.profile}"
install_name = "rust-app"
install_class = "binary"
install_dest_hint = "/usr/bin/rust-app"
output_path = "${workspace.out_dir}/artifacts/rust-app"

[artifacts.execution]
backend = "docker"

[artifacts.execution.docker]
image = "gaia-aarch64-cross-artifacts:latest"

[[artifacts]]
id = "go-app"
kind = "go"
package = "."
source = "go-source"
target = "linux/arm64"
install_name = "go-app"
install_class = "binary"
install_dest_hint = "/usr/bin/go-app"
output_path = "${workspace.out_dir}/artifacts/go-app"

[artifacts.execution]
backend = "docker"

[artifacts.execution.docker]
image = "gaia-aarch64-cross-artifacts:latest"

[[install]]
id = "install-rust-app"
artifact = "rust-app"
dest = "/usr/bin/rust-app"
replace = true
mode = 493
owner = "root"
group = "root"

[[install]]
id = "install-go-app"
artifact = "go-app"
dest = "/usr/bin/go-app"
replace = true
mode = 493
owner = "root"
group = "root"

[[stage.files]]
id = "motd"
src = "@assets/etc/motd"
dest = "/etc/motd"
origin = "static-asset"

[image]
kind = "starting-point"
source = "base-rootfs"
source_path = "content/base-rootfs.tar"
rootfs_validation_mode = "require-file"
output_mode = "copy-and-archive"

[image.feed]
install_entries = ["install-rust-app", "install-go-app"]
stage_files = ["motd"]

[image.output]
collect_dir = "${workspace.out_dir}/images"
archive_name = "${build.name}-${build.version}.tar"
emit_report = true
