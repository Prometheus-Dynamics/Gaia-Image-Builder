# Buildroot image template.

[image]
kind = "buildroot"

# Optional Buildroot defconfig.
defconfig = "raspberrypi_defconfig"

# Optional Buildroot external tree path.
external_tree = "@assets/buildroot"

# auto | required | disabled
external_tree_mode = "required"

[image.feed]
# Explicitly list which install/stage domains contribute to the image.
install_entries = ["install-helios-api", "install-heliosctl"]
stage_files = ["hostname", "motd", "generated-build-info"]
stage_env_sets = ["runtime-env", "api-env"]
stage_services = ["helios-api", "helios-engine"]

[[image.expected_images]]
name = "sdcard.img"
format = "raw"
required = true

[[image.expected_images]]
name = "rootfs.tar"
format = "tar"
required = false

[image.output]
collect_dir = "${workspace.out_dir}/images"
archive_name = "${build.name}-${build.version}.img.xz"
emit_report = true
