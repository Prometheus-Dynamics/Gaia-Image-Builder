# Minimal Buildroot-style Gaia template.

build_name = "my-buildroot-image"
version = "2.0.0"
target = "cm5"
profile = "release"

[workspace]
root_dir = "."
build_dir = ".gaia/examples/templates/minimal-buildroot/build"
out_dir = ".gaia/examples/templates/minimal-buildroot/out"

[[workspace.named_paths]]
alias = "assets"
path = "assets"
kind = "host"

[[sources]]
id = "workspace-root"
kind = "path"
path = "${workspace.root_dir}"
refresh = "never"
pin = "locked"

[[artifacts]]
id = "my-app"
kind = "rust"
package = "my-app"
source = "workspace-root"
profile = "${build.profile}"
install_name = "my-app"
install_class = "binary"
install_dest_hint = "/usr/bin/my-app"
output_path = "${workspace.out_dir}/artifacts/my-app"

[[install]]
id = "install-my-app"
artifact = "my-app"
dest = "/usr/bin/my-app"
replace = true
mode = 493

[[stage.files]]
id = "motd"
src = "@assets/etc/motd"
dest = "/etc/motd"
origin = "static-asset"

[image]
kind = "buildroot"
defconfig = "raspberrypi_defconfig"
external_tree_mode = "auto"

[image.feed]
install_entries = ["install-my-app"]
stage_files = ["motd"]

[[image.expected_images]]
name = "sdcard.img"
format = "raw"
required = true

[image.output]
collect_dir = "${workspace.out_dir}/images"
archive_name = "${build.name}-${build.version}.img.xz"
emit_report = true
