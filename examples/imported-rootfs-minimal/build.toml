# Smallest self-contained example that produces a real image archive.

build_name = "imported-rootfs-minimal"
version = "2.0.0"
description = "Tiny starting-point image from a local seed rootfs."
target = "local"
profile = "release"

[workspace]
root_dir = "examples/imported-rootfs-minimal"
build_dir = "../../.gaia/examples/imported-rootfs-minimal/build"
out_dir = "../../.gaia/examples/imported-rootfs-minimal/out"

[reporting]
summary = true
provenance = true
manifest = true

[image]
kind = "starting-point"
rootfs_path = "seed-rootfs"
rootfs_validation_mode = "require-directory"
output_mode = "copy-and-archive"

[image.output]
collect_dir = "${workspace.out_dir}/images"
archive_name = "${build.name}-${build.version}.tar"
emit_report = true

[execution]
jobs = 1
